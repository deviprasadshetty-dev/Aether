<!DOCTYPE html>
<html>

<head>
  <title>Aether</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .logo {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.5px;
    }

    .subtitle {
      font-size: 10px;
      color: #64748b;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .status-card {
      padding: 14px 16px;
      border-radius: 10px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s ease;
    }

    .status-card.connected {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.25);
    }

    .status-card.disconnected {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.25);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .connected .status-dot {
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
      animation: pulse-green 2s ease-in-out infinite;
    }

    .disconnected .status-dot {
      background: #ef4444;
      box-shadow: 0 0 8px rgba(239, 68, 68, 0.4);
    }

    @keyframes pulse-green {

      0%,
      100% {
        box-shadow: 0 0 8px rgba(34, 197, 94, 0.3);
      }

      50% {
        box-shadow: 0 0 14px rgba(34, 197, 94, 0.6);
      }
    }

    .status-text {
      font-size: 13px;
      font-weight: 500;
    }

    .connected .status-text {
      color: #86efac;
    }

    .disconnected .status-text {
      color: #fca5a5;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: rgba(30, 41, 59, 0.6);
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .info-label {
      color: #64748b;
    }

    .info-value {
      color: #94a3b8;
      font-weight: 500;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 8px;
    }

    #reconnect {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white;
    }

    #reconnect:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(59, 130, 246, 0.4);
    }

    #reconnect:active {
      transform: translateY(0);
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="logo">⚡</div>
    <div>
      <div class="title">Aether</div>
      <div class="subtitle">AI Browser Controller</div>
    </div>
  </div>

  <div id="status" class="status-card disconnected">
    <div class="status-dot"></div>
    <span class="status-text">Checking...</span>
  </div>

  <div class="info-row">
    <span class="info-label">Server</span>
    <span class="info-value">ws://localhost:3009</span>
  </div>

  <div class="info-row">
    <span class="info-label">Protocol</span>
    <span class="info-value">MCP v2.0</span>
  </div>

  <button id="reconnect">⟳ Reconnect</button>

  <script src="popup.js"></script>
</body>

</html>
